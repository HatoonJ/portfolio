<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download My QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column justify-content-center align-items-center vh-100" style="background: var(--bg-color);">
    <div class="text-center">
        <h1 class="mb-4">Download My Portfolio QR Code</h1>
        <img src="img/portfolio_qr.png" alt="Portfolio QR Code" class="img-fluid mb-4" style="max-width: 350px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);">
        <br>
        <a href="img/portfolio_qr.png" download class="btn btn-genz px-4 py-3">
            <i class="fas fa-download me-2"></i>Download QR Code
        </a>
        <br><br>
        <a href="index.html" class="btn btn-outline-primary mt-2">Back to Portfolio</a>
    </div>
</body>
</html>
